<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
</head>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }
    .nav {
        background-color: azure;
        padding: 10px 20px;
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
        margin-top: 20px;
        border-radius: 10px;
    }
    .nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 20px;
    }
    .nav ul li {
        display: inline;
        margin: 0 10px;

    }
    .nav ul li a {
        text-decoration: none;
        color: black;
        font-weight: bold;
        padding: 5px 10px;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }
    .nav ul li a:hover {
        background-color: rgb(59, 113, 229);
        text-decoration: underline;
    }
</style>
<body>
    <!-- Navigation Bar -->

    <section id="navigation">
        <nav class="nav">
            <ul>
                <li><a href="#hero-sec">Home</a></li>
                <li><a href="#about-sec">About</a></li>
                <li><a href="#services-sec">Services</a></li>
                <li><a href="#contact-sec">Contact</a></li>
            </ul>
        </nav>
    </section>
</body>
</html>
